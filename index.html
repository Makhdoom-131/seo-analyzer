<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f1117,#1a1f2e);
  color:#fff;
  margin:0;
}

.hero { text-align:center; padding:50px 20px; }
.hero p { color:#aaa; }

.input-box {
  max-width:900px;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  background:#181c27;
  padding:15px;
  border-radius:12px;
}

input {
  flex:1;
  padding:12px;
  background:#1e2333;
  border:none;
  border-radius:8px;
  color:#fff;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

#results { max-width:950px; margin:30px auto; }

.section {
  background:#181c27;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
}

.issue {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.tip { color:#f7c948; }

.footer { text-align:center; margin:40px; color:#aaa; }

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#181c27;
  padding:25px;
  border-radius:12px;
  width:300px;
  z-index:999;
}

#popup-close {
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
  <p>Analyze & fix your website performance easily</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter your website URL">
  <input id="compInput" placeholder="Competitor URL (optional)">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div style="text-align:center;">
  <button onclick="downloadPDF()">📄 Download Report</button>
</div>

<div style="text-align:center;margin-top:15px;">
  <input id="email" placeholder="Enter your email">
  <button onclick="captureEmail()">Get Report</button>
</div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank" style="color:#4f8ef7;">Hire Me</a>
</div>

<!-- POPUP -->
<div id="popup">
  <span id="popup-close" onclick="closePopup()">❌</span>
  <h3>🚀 Need Help?</h3>
  <p style="font-size:13px;color:#ccc;">
    Don’t have time to fix all issues?
  </p>
  <p style="font-size:13px;">
    📩 Makhdoomabdulaleem@gmail.com<br>
    💬 +92 347 3606783
  </p>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">
    <button style="width:100%;">Hire Me</button>
  </a>
</div>

<script>

const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function fetchData(url){
  const res = await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
  if(!res.ok) throw new Error("Fetch failed");
  return await res.json();
}

async function runAnalysis(){

let url = document.getElementById("urlInput").value;
let comp = document.getElementById("compInput").value;

if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url="https://"+url;

document.getElementById("results").innerHTML="Analyzing...";

try{

const data = await fetchData(url);

if(!data.mobile?.lighthouseResult) throw new Error("API failed");

const m = data.mobile.lighthouseResult;
const d = data.desktop.lighthouseResult;

const myScore = Math.round(m.categories.performance.score*100);
const deskScore = Math.round(d.categories.performance.score*100);

// COMPETITOR
let compScore = 0;
if(comp){
  if(!comp.startsWith("http")) comp="https://"+comp;
  const compData = await fetchData(comp);
  compScore = Math.round(compData.mobile.lighthouseResult.categories.performance.score*100);
}

// ISSUES
const audits = m.audits;
const issues = Object.values(audits).filter(a=>a.score!==null && a.score<0.9).slice(0,6);

// LCP
const lcp = audits['largest-contentful-paint']?.displayValue || "N/A";

// UI
document.getElementById("results").innerHTML = `

<div class="section">
<h3>📊 Summary</h3>
<p>Your performance score is <b>${myScore}</b>. Improving key issues can significantly boost speed.</p>
<p>⚡ LCP: ${lcp}</p>
</div>

<canvas id="chart" height="120"></canvas>

<div class="section">
<h3>🔥 Fix These First</h3>
${issues.slice(0,3).map(i=>`• ${i.title}`).join("<br>")}
</div>

<div class="section">
<h3>⚠️ Issues</h3>
${issues.map(i=>`
<div class="issue">
<b>${i.title}</b><br>
<span class="tip">👉 Improve this for better speed</span><br>
<button onclick="showPopup()">Fix this for me</button>
</div>
`).join("")}
</div>

`;

// CHART
setTimeout(()=>{
const ctx=document.getElementById("chart");
if(ctx){
new Chart(ctx,{
type:'bar',
data:{
labels:["Mobile","Desktop","Competitor"],
datasets:[{
label:"Score",
data:[myScore,deskScore,compScore]
}]
}
});
}
},200);

// POPUP
setTimeout(()=>showPopup(),2500);

}catch(e){
console.error(e);
document.getElementById("results").innerHTML="Error loading data. Try again.";
}

}

function showPopup(){
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function downloadPDF(){
html2pdf().from(document.getElementById("results")).save("seo-report.pdf");
}

function captureEmail(){
const email=document.getElementById("email").value;
if(!email) return alert("Enter email");
alert("Thanks! We will contact you.");
}

</script>

</body>
</html>
