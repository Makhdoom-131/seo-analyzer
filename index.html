<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f1117,#1a1f2e);
  color:#fff;
  margin:0;
}

.hero { text-align:center; padding:60px 20px 20px; }
.hero p { color:#aaa; }

.input-box {
  max-width:800px;
  margin:auto;
  display:flex;
  gap:10px;
  background:#181c27;
  padding:15px;
  border-radius:12px;
}

input {
  flex:1;
  padding:14px;
  background:#1e2333;
  border:none;
  border-radius:8px;
  color:#fff;
}

button {
  padding:14px 22px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

#results { max-width:950px; margin:40px auto; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
}

.card {
  background:#181c27;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.section {
  background:#181c27;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
}

.issue {
  background:#111;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}

.badge {
  font-size:12px;
  padding:3px 8px;
  border-radius:6px;
  margin-right:5px;
}

.high { background:#ff4d4d; }
.medium { background:#f7c948; color:#000; }
.low { background:#4caf50; }

.tip { color:#f7c948; }

.footer { text-align:center; margin:40px 0; color:#aaa; }

/* POPUP */
#popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#181c27;
  padding:25px;
  border-radius:12px;
  width:300px;
  z-index:999;
}

#popup-close {
  position:absolute;
  top:10px;
  right:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
  <p>Understand & fix your website issues easily</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div style="text-align:center;">
  <button onclick="downloadPDF()">📄 Download Report</button>
</div>

<div style="text-align:center;margin-top:20px;">
  <input id="email" placeholder="Enter your email">
  <button onclick="captureEmail()">Get Report</button>
</div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank" style="color:#4f8ef7;">Hire Me</a>
</div>

<!-- POPUP -->
<div id="popup">
  <span id="popup-close" onclick="closePopup()">❌</span>
  <h3>⚡ Want these fixes done?</h3>
  <p style="font-size:13px;color:#ccc;">
    I can improve your speed, SEO & conversions.
  </p>
  <p style="font-size:13px;">
    📩 Makhdoomabdulaleem@gmail.com<br>
    💬 +92 347 3606783
  </p>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">
    <button style="width:100%;">Hire Me</button>
  </a>
</div>

<script>

const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

function getPriority(title){
  if(title.includes("LCP") || title.includes("render") || title.includes("blocking"))
    return ["high","🔴 High Impact"];
  if(title.includes("CSS") || title.includes("JavaScript"))
    return ["medium","🟡 Medium Impact"];
  return ["low","🟢 Low Impact"];
}

function simpleFix(title){
  if(title.includes("LCP")) return "Optimize main image and reduce server response time.";
  if(title.includes("render")) return "Delay scripts and CSS loading.";
  if(title.includes("JavaScript")) return "Remove unused JS.";
  if(title.includes("CSS")) return "Minify CSS files.";
  return "Optimize this issue.";
}

async function runAnalysis(){

let url=document.getElementById("urlInput").value;
if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url="https://"+url;

document.getElementById("results").innerHTML="Analyzing...";

const res=await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
const data=await res.json();

const m=data.mobile.lighthouseResult;
const d=data.desktop.lighthouseResult;

const audits=m.audits;

// 🔥 PRIORITY ISSUES
const issues=Object.values(audits).filter(a=>a.score!==null && a.score<0.9).slice(0,8);

// 🔥 SUMMARY
let summary="Your website has performance issues affecting speed.";
if(m.categories.performance.score<0.5)
summary="Your website is slow and may lose visitors.";

// 🔥 POTENTIAL
const potential=Math.min(100,Math.round(m.categories.performance.score*100+20));

// 🔥 UI
document.getElementById("results").innerHTML=`

<div class="section">
<h3>📊 Summary</h3>
<p>${summary}</p>
<p>Potential Score: ${potential}</p>
</div>

<div class="grid">
<div class="card">${Math.round(m.categories.performance.score*100)}<br>Mobile</div>
<div class="card">${Math.round(d.categories.performance.score*100)}<br>Desktop</div>
</div>

<div class="section">
<h3>🔥 Fix These First</h3>
${issues.slice(0,3).map(i=>`• ${i.title}`).join("<br>")}
</div>

<div class="section">
<h3>⚠️ Issues & Fixes</h3>
${issues.map(i=>{
let p=getPriority(i.title);
return `
<div class="issue">
<span class="badge ${p[0]}">${p[1]}</span>
<b>${i.title}</b><br>
<span class="tip">👉 ${simpleFix(i.title)}</span><br>
<button onclick="showPopup()">Fix this for me</button>
</div>`;
}).join("")}
</div>

`;

setTimeout(()=>showPopup(),3000);

}

function showPopup(){
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function downloadPDF(){
html2pdf().from(document.getElementById("results")).save("seo-report.pdf");
}

function captureEmail(){
const email=document.getElementById("email").value;
if(!email) return alert("Enter email");
alert("Thanks! We will contact you.");
}

</script>

</body>
</html>
