<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { 
  font-family: 'Inter', sans-serif; 
  background: #0f1117; 
  color: #fff; 
  margin: 0; 
  line-height: 1.6;
  /* Add padding to bottom so sticky bar/fixed footer doesn't hide content */
  padding-bottom: 100px; 
}
.hero { text-align:center; padding:60px 20px 20px; }
.hero h1 { margin: 0; font-size: 2.5em; }
.hero p { color: #888; margin-top: 10px; }
.input-box { max-width:900px; margin:30px auto; display:flex; gap:10px; padding:0 20px; }
input { 
  flex:1; padding:14px 16px; border-radius:8px; border:1px solid #2a2f3e; 
  background:#1a1f2e; color:#fff; font-size:16px; 
}
input:focus { outline:none; border-color:#6c5ce7; }
button { 
  padding:14px 24px; background:#6c5ce7; color:#fff; border:none; 
  border-radius:8px; cursor:pointer; font-weight:600; font-size:16px; 
  transition: background 0.3s;
}
button:hover { background:#5a4bd1; }

#results { max-width:1000px; margin:0 auto 40px; padding:0 20px; }

.section { 
  background:#1a1f2e; padding:24px; margin-top:20px; border-radius:12px; 
  border:1px solid #2a2f3e; 
}
.section h3 { margin-top: 0; }

.scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.score-card { background:#111; padding:20px; border-radius:10px; text-align:center; }
.score-label { display:block; font-size:14px; color:#888; margin-bottom:8px; }
.score-value { font-size:3em; font-weight:700; }

.og-card {
  border:1px solid #333; border-radius:12px; overflow:hidden; 
  max-width:500px; background:#111; font-family: sans-serif;
}
.og-card img { width:100%; height:200px; object-fit:cover; background:#222; }
.og-text { padding:15px; }
.og-text span { color:#666; font-size:12px; }
.og-text h4 { margin:5px 0; color:#fff; font-size:16px;}
.og-text p { margin:0; color:#aaa; font-size:14px; }

.issue { 
  background:#111; padding:12px 16px; margin:8px 0; border-radius:8px; 
  border-left: 3px solid #ff6b6b; display:flex; align-items:center; gap:12px;
}
.issue img { border-radius:6px; object-fit:cover; }
.tip { color:#f7c948; font-size:14px; }

/* ✨ STICKY HIRE ME BAR (Hidden by default) */
#sticky-cta {
  display: none; /* Hidden until analysis finishes */
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(15, 17, 23, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid #2a2f3e;
  padding: 15px 20px;
  z-index: 1000;
  justify-content: center;
  align-items: center;
  gap: 20px;
  animation: slideUp 0.5s ease-out;
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.cta-text {
  font-weight: 600;
  color: #fff;
}
.cta-text span {
  color: #888;
  font-weight: 400;
  font-size: 14px;
  margin-left: 8px;
}
.hire-btn {
  background: #14a800; /* Upwork Green */
  color: white;
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: 700;
  transition: background 0.3s;
}
.hire-btn:hover {
  background: #118c00;
}
.contact-links a {
  color: #aaa;
  text-decoration: none;
  margin-left: 15px;
  font-size: 14px;
  transition: color 0.2s;
}
.contact-links a:hover { color: #fff; }

/* ✨ FOOTER STYLES */
footer {
  text-align: center;
  padding: 40px 20px;
  color: #555;
  font-size: 14px;
  border-top: 1px solid #1a1f2e;
  margin-top: 60px;
}
footer a {
  color: #6c5ce7;
  text-decoration: none;
}
footer a:hover {
  text-decoration: underline;
}

@media (max-width: 768px) {
  .input-box { flex-direction: column; }
  .scores-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 1.8em; }
  
  #sticky-cta {
    flex-direction: column;
    text-align: center;
    gap: 10px;
  }
  .contact-links { margin-top: 5px; }
  .contact-links a { margin: 0 8px; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
  <p>Full SEO, Open Graph & Performance Audit</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL (e.g., example.com)">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<!-- Professional Footer -->
<footer>
  <p>Built with ❤️ by <strong>Makhdoom Abdul Aleem</strong></p>
  <p style="margin-top: 8px;">
    <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Upwork Profile</a> &nbsp;|&nbsp; 
    makhdoomabdulaleem@gmail.com &nbsp;|&nbsp; 
    +92 347 360 6083
  </p>
</footer>

<!-- Sticky "Hire Me" CTA Bar -->
<div id="sticky-cta">
  <div class="cta-text">
    Impressed by the tool? Hire me to build one for you.
    <span>(Frontend, Backend & Cloudflare Workers)</span>
  </div>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank" class="hire-btn">Hire Me on Upwork</a>
  <div class="contact-links">
    <a href="mailto:makhdoomabdulaleem@gmail.com">📧 Email</a>
    <a href="tel:+923473606083">📞 Call</a>
  </div>
</div>

<script>
const API = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

function getScoreColor(score) {
  if (score >= 90) return "#00c853";
  if (score >= 50) return "#ffab00";
  return "#ff1744";
}

async function runAnalysis() {
  let url = document.getElementById("urlInput").value.trim();
  if (!url) return alert("Please enter a URL");
  if (!url.startsWith("http")) url = "https://" + url;

  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = `<div class="section" style="text-align:center;">⏳ Fetching data from Google PageSpeed & parsing HTML... (This takes ~10-15 seconds)</div>`;
  
  // Hide CTA while loading
  document.getElementById("sticky-cta").style.display = "none";

  try {
    const res = await fetch(API + encodeURIComponent(url));
    if (!res.ok) throw new Error("Worker fetch failed");
    const data = await res.json();

    if (!data.mobile?.lighthouseResult) throw new Error("Invalid API response structure");

    const mScore = Math.round(data.mobile.lighthouseResult.categories.performance.score * 100);
    const dScore = Math.round(data.desktop.lighthouseResult.categories.performance.score * 100);

    const images = data.images || [];
    const missingAlt = images.filter(i => !i.alt);
    const links = data.links || [];

    const issues = Object.values(data.mobile.lighthouseResult.audits)
      .filter(a => a.score !== null && a.score < 0.9)
      .slice(0, 5);

    const seo = data.seo || {};
    const displayUrl = new URL(url);

    resultsDiv.innerHTML = `

      <div class="section">
        <h3>📊 Performance Scores</h3>
        <div class="scores-grid">
          <div class="score-card">
            <span class="score-label">📱 Mobile</span>
            <span class="score-value" style="color:${getScoreColor(mScore)}">${mScore}</span>
          </div>
          <div class="score-card">
            <span class="score-label">🖥️ Desktop</span>
            <span class="score-value" style="color:${getScoreColor(dScore)}">${dScore}</span>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>🐦 Social Share Preview (Open Graph)</h3>
        <div class="og-card">
          <img src="${seo.ogImage || 'https://placehold.co/500x200/1a1f2e/666?text=No+OG+Image+Set'}" alt="Preview">
          <div class="og-text">
            <span>${displayUrl.hostname}</span>
            <h4>${seo.ogTitle || seo.title || '❌ Missing Title Tag'}</h4>
            <p>${seo.ogDescription || seo.metaDescription || '❌ Missing Meta Description'}</p>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>🖼️ Image Audit (${images.length} found, ${missingAlt.length} missing ALT)</h3>
        ${images.length ? images.map(img => `
          <div class="issue">
            ${img.src ? `<img src="${img.src}" width="50" height="50">` : ""}
            <div>
              <div style="font-size:12px; color:#aaa; word-break:break-all;">${img.src.substring(0, 60)}...</div>
              <div style="color: ${img.alt ? '#00c853' : '#ff6b6b'}">
                ALT: ${img.alt || "❌ Missing"}
              </div>
            </div>
          </div>
        `).join("") : "<p>⚠️ Could not extract images from HTML</p>"}
      </div>

      <div class="section">
        <h3>🔗 Extracted Links</h3>
        ${links.length ? links.map(l => `
          <div class="issue" style="border-left-color:#6c5ce7; word-break:break-all; font-size:14px;">
            ${l}
          </div>
        `).join("") : "<p>⚠️ Could not extract links from HTML</p>"}
      </div>

      <div class="section">
        <h3>⚠️ Top Performance Issues</h3>
        ${issues.length ? issues.map(i => `
          <div class="issue">
            <div style="flex:1;">
              <b>${i.title}</b>
              <div class="tip">👉 ${i.displayValue || 'Needs improvement'}</div>
            </div>
          </div>
        `).join("") : "<p>✅ No major performance issues found!</p>"}
      </div>
    `;

    // ✨ SHOW THE STICKY HIRE ME BAR AFTER RESULTS LOAD
    document.getElementById("sticky-cta").style.display = "flex";

  } catch (e) {
    console.error(e);
    resultsDiv.innerHTML = `
      <div class="section" style="border:1px solid #ff6b6b;">
        ❌ <b>Failed to analyze this site.</b><br><br>
        👉 Reasons this happens:<br>
        1. The website blocks automated requests (Cloudflare shield, etc.)<br>
        2. The URL was typed incorrectly.<br>
        3. The Worker API key is missing (check Cloudflare env variables).
      </div>`;
  }
}

document.getElementById("urlInput").addEventListener("keypress", function(event) {
  if (event.key === "Enter") runAnalysis();
});
</script>
</body>
</html>
