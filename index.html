<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background:#0f1117;
  color:#e8eaf0;
  margin:0;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px 20px;
}

.hero h1 {
  font-size:32px;
}

/* INPUT */
.input-box {
  max-width:800px;
  margin:20px auto;
  background:#181c27;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid #2a2f42;
  background:#1e2333;
  color:#fff;
}

button {
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

/* RESULTS */
#results {
  max-width:900px;
  margin:20px auto;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.card {
  background:#181c27;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.score {
  font-size:22px;
  font-weight:600;
}

/* SECTIONS */
.section {
  background:#181c27;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}

.tip {
  color:#f7c948;
}

/* FOOTER */
.footer {
  text-align:center;
  margin:40px 0;
  color:#fff;
}

.footer a {
  color:#4f8ef7;
}

/* EMAIL */
.email-box {
  text-align:center;
  margin:30px;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:#181c27;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div style="text-align:center;">
  <button onclick="downloadPDF()">📄 Download Report</button>
</div>

<div class="email-box">
  <input id="email" placeholder="Enter your email">
  <button onclick="captureEmail()">Submit</button>
</div>

<div id="popup">
  <p>Need SEO help?</p>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">
    <button>Hire Me</button>
  </a>
</div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Hire Me</a>
</div>
<script>

const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;
if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url = "https://" + url;

document.getElementById("results").innerHTML = "<div class='section'>Analyzing...</div>";

try{

const res = await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
const data = await res.json();

if(!data.mobile?.lighthouseResult){
  throw new Error("API failed");
}

// 🔥 MOBILE
const m = data.mobile.lighthouseResult;
const d = data.desktop.lighthouseResult;

// Scores
const mPerf = Math.round(m.categories.performance.score * 100);
const dPerf = Math.round(d.categories.performance.score * 100);

// Core vitals (REAL)
const mLCP = m.audits['largest-contentful-paint']?.displayValue;
const dLCP = d.audits['largest-contentful-paint']?.displayValue;

// 🔥 INSIGHTS (REAL audits)
const audits = m.audits;

function getAudit(id){
  return audits[id]?.title + " → " + (audits[id]?.displayValue || "");
}

const insights = [
  'render-blocking-resources',
  'unused-javascript',
  'largest-contentful-paint-element',
  'total-blocking-time',
  'unused-css-rules'
].map(getAudit).filter(Boolean);

// 🔥 HTML SEO
const doc = new DOMParser().parseFromString(data.html, "text/html");

const title = doc.querySelector("title")?.innerText || "Not found";
const desc = doc.querySelector('meta[name="description"]')?.content || "Not found";
const h1 = doc.querySelectorAll("h1").length;

// 🔥 SIMPLE GUIDANCE
let tips = [];

if(mPerf < 70) tips.push("⚡ Your site is slow — optimize images & scripts");
if(mLCP && mLCP.includes("s")) tips.push("🚀 Improve LCP by optimizing hero image");
if(h1 !== 1) tips.push("📑 Use exactly one H1 tag");
if(desc.length < 140) tips.push("✍️ Write better meta description");

// UI
document.getElementById("results").innerHTML = `

<div class="grid">
<div class="card"><div class="score">${mPerf}</div><div>Mobile Score</div></div>
<div class="card"><div class="score">${dPerf}</div><div>Desktop Score</div></div>
</div>

<div class="section">
<h3>📊 Core Web Vitals</h3>
<p><b>Mobile LCP:</b> ${mLCP}</p>
<p><b>Desktop LCP:</b> ${dLCP}</p>
</div>

<div class="section">
<h3>⚠️ Key Issues (from Google)</h3>
${insights.map(i=>`<div class="tip">• ${i}</div>`).join("")}
</div>

<div class="section">
<h3>💡 Easy Fix Suggestions</h3>
${tips.map(t=>`<div class="tip">• ${t}</div>`).join("")}
</div>

<div class="section">
<h3>🏷 SEO</h3>
<p><b>Title:</b> ${title}</p>
<p><b>Description:</b> ${desc}</p>
<p><b>H1:</b> ${h1}</p>
</div>

`;

}catch(e){
console.error(e);
document.getElementById("results").innerHTML = "<div class='section'>Error loading data</div>";
}

}

</script>
</body>
</html>
