<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f1117,#1a1f2e);
  color:#fff;
  margin:0;
}

.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  font-size:38px;
}

.input-box {
  max-width:800px;
  margin:auto;
  display:flex;
  gap:10px;
  background:#181c27;
  padding:15px;
  border-radius:12px;
}

input {
  flex:1;
  padding:12px;
  background:#1e2333;
  border:none;
  border-radius:8px;
  color:#fff;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

#results {
  max-width:900px;
  margin:30px auto;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card {
  background:#181c27;
  padding:20px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.score {
  font-size:26px;
  font-weight:600;
}

.section {
  background:#181c27;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  animation:fadeIn 0.5s ease;
}

.tip {
  color:#f7c948;
  margin:5px 0;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* CTA BAR */
.cta-bar {
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#aaa;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:#181c27;
  padding:20px;
  border-radius:12px;
  width:260px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div class="cta-bar">
📩 Makhdoomabdulaleem@gmail.com | 💬 +92 347 3606783
</div>

<div id="results"></div>

<!-- POPUP -->
<div id="popup">
  <p>🚀 Need help growing your website?</p>
  <ul style="font-size:13px;color:#ccc;">
    <li>SEO Optimization</li>
    <li>WordPress Development</li>
    <li>Speed Optimization</li>
  </ul>

  <a href="mailto:Makhdoomabdulaleem@gmail.com">📩 Email</a><br>
  <a href="https://wa.me/923473606783" target="_blank">💬 WhatsApp</a>

  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">
    <button style="margin-top:10px;width:100%;">Hire Me</button>
  </a>
</div>

<script>

const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;

if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url = "https://" + url;

document.getElementById("results").innerHTML = "<div class='section'>Analyzing...</div>";

try{

const res = await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
const data = await res.json();

const m = data.mobile.lighthouseResult;
const d = data.desktop.lighthouseResult;

const mPerf = Math.round(m.categories.performance.score * 100);
const dPerf = Math.round(d.categories.performance.score * 100);

const mLCP = m.audits['largest-contentful-paint']?.displayValue;
const dLCP = d.audits['largest-contentful-paint']?.displayValue;

// Insights
const audits = m.audits;

const issues = [
  audits['render-blocking-resources'],
  audits['unused-javascript'],
  audits['largest-contentful-paint-element'],
  audits['total-blocking-time']
].filter(Boolean);

// HTML SEO
const doc = new DOMParser().parseFromString(data.html,"text/html");

const title = doc.querySelector("title")?.innerText || "Not found";
const desc = doc.querySelector('meta[name="description"]')?.content || "Not found";

// UI
document.getElementById("results").innerHTML = `

<div class="grid">
<div class="card"><div class="score">${mPerf}</div><div>Mobile</div></div>
<div class="card"><div class="score">${dPerf}</div><div>Desktop</div></div>
</div>

<div class="section">
<h3>⚡ Core Web Vitals</h3>
<p>Mobile LCP: ${mLCP}</p>
<p>Desktop LCP: ${dLCP}</p>
</div>

<div class="section">
<h3>⚠️ Key Issues</h3>
${issues.map(i=>`<div class="tip">• ${i.title}</div>`).join("")}
</div>

<div class="section">
<h3>🏷 SEO</h3>
<p><b>Title:</b> ${title}</p>
<p><b>Description:</b> ${desc}</p>
</div>

`;

setTimeout(()=>{document.getElementById("popup").style.display="block";},2000);

}catch(e){
console.error(e);
document.getElementById("results").innerHTML = "<div class='section'>Error loading data</div>";
}

}

</script>

</body>
</html>
