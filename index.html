<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#0f1117,#1a1f2e);
  color:#fff;
  margin:0;
}

.hero {
  text-align:center;
  padding:50px 20px 10px;
}

.hero p {
  color:#aaa;
}

.input-box {
  max-width:800px;
  margin:auto;
  display:flex;
  gap:10px;
  background:#181c27;
  padding:15px;
  border-radius:12px;
}

input {
  flex:1;
  padding:12px;
  background:#1e2333;
  border:none;
  border-radius:8px;
  color:#fff;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

#results {
  max-width:900px;
  margin:30px auto;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card {
  background:#181c27;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.score {
  font-size:26px;
}

.section {
  background:#181c27;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
}

.tip { color:#f7c948; }

.footer {
  text-align:center;
  margin:40px 0;
}

.footer a { color:#4f8ef7; }

/* POPUP CENTER */
#popup {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#181c27;
  padding:25px;
  border-radius:12px;
  width:300px;
  z-index:999;
}

#popup-close {
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
  <p>Analyze performance, SEO & issues with real Google data</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div style="text-align:center;">
  <button onclick="downloadPDF()">📄 Download Report</button>
</div>

<div style="text-align:center;margin-top:20px;">
  <input id="email" placeholder="Enter email">
  <button onclick="captureEmail()">Get Report</button>
</div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Hire Me</a>
</div>

<!-- POPUP -->
<div id="popup">
  <span id="popup-close" onclick="closePopup()">❌</span>
  <p>🚀 Need help with your website?</p>
  <ul style="font-size:13px;color:#ccc;">
    <li>SEO Optimization</li>
    <li>Web Design & Development</li>
    <li>Speed Optimization</li>
  </ul>
  <p style="font-size:13px;">
    📩 Makhdoomabdulaleem@gmail.com<br>
    💬 +92 347 3606783
  </p>
</div>

<script>

const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;
if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url = "https://" + url;

document.getElementById("results").innerHTML = "Analyzing...";

const res = await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
const data = await res.json();

const m = data.mobile.lighthouseResult;
const d = data.desktop.lighthouseResult;

const audits = m.audits;

// LCP ELEMENT 🔥
const lcpEl = audits['largest-contentful-paint-element']?.details?.items?.[0]?.node?.snippet || "Not found";

// INSIGHTS
const issues = Object.values(audits)
  .filter(a => a.score !== null && a.score < 0.9)
  .slice(0,10);

// SEO
const doc = new DOMParser().parseFromString(data.html,"text/html");
const title = doc.querySelector("title")?.innerText || "Not found";
const desc = doc.querySelector('meta[name="description"]')?.content || "Not found";

// UI
document.getElementById("results").innerHTML = `

<div class="grid">
<div class="card"><div class="score">${Math.round(m.categories.performance.score*100)}</div><div>Mobile</div></div>
<div class="card"><div class="score">${Math.round(d.categories.performance.score*100)}</div><div>Desktop</div></div>
</div>

<div class="section">
<h3>⚡ LCP Element</h3>
${lcpEl}
</div>

<div class="section">
<h3>⚠️ Issues & Fixes</h3>
${issues.map(i=>`<div class="tip">• ${i.title} → Fix: ${i.description || "Optimize this"}</div>`).join("")}
</div>

<div class="section">
<h3>🏷 SEO</h3>
<p>Title: ${title}</p>
<p>Description: ${desc}</p>
</div>
`;

setTimeout(()=>{document.getElementById("popup").style.display="block";},2000);

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function downloadPDF(){
html2pdf().from(document.getElementById("results")).save("seo-report.pdf");
}

function captureEmail(){
const email = document.getElementById("email").value;
if(!email) return alert("Enter email");
alert("Report will be sent (connect backend later)");
}

</script>

</body>
</html>
