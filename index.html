<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:Inter; background:#0f1117; color:#fff; margin:0; }
.hero { text-align:center; padding:40px; }
.input-box { max-width:900px; margin:auto; display:flex; gap:10px; padding:10px; }
input { flex:1; padding:10px; border-radius:6px; border:none; }
button { padding:10px 15px; background:#6c5ce7; color:#fff; border:none; border-radius:6px; }
#results { max-width:1000px; margin:20px auto; }
.section { background:#1a1f2e; padding:15px; margin-top:15px; border-radius:10px; }
.issue { background:#111; padding:10px; margin:8px 0; border-radius:8px; }
.tip { color:#f7c948; }
</style>
</head>

<body>

<div class="hero">
<h1>🚀 SEO Analyzer</h1>
<p>Full SEO + Performance Audit</p>
</div>

<div class="input-box">
<input id="urlInput" placeholder="Enter website">
<input id="compInput" placeholder="Competitor (optional)">
<button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<script>

const API = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;
let comp = document.getElementById("compInput").value;

if(!url) return alert("Enter URL");
if(!url.startsWith("http")) url="https://"+url;

document.getElementById("results").innerHTML="Analyzing...";

try{

const res = await fetch(API + encodeURIComponent(url));
const data = await res.json();

const m = data.mobile.lighthouseResult;
const score = Math.round(m.categories.performance.score*100);

// IMAGE AUDIT
const images = data.images;
const missingAlt = images.filter(i => !i.alt);

// ISSUES
const audits = m.audits;
const issues = Object.values(audits).filter(a=>a.score!==null && a.score<0.9).slice(0,5);

// UI
document.getElementById("results").innerHTML = `

<div class="section">
<h3>📊 Summary</h3>
<p>Performance Score: <b>${score}</b></p>
<p>Total Images: ${images.length}</p>
<p>Missing ALT Tags: ${missingAlt.length}</p>
</div>

<div class="section">
<h3>🖼 Image Audit</h3>
${images.slice(0,5).map(img=>`
<div class="issue">
<img src="${img.src}" width="50"><br>
ALT: ${img.alt || "❌ Missing"}
</div>
`).join("")}
</div>

<div class="section">
<h3>🔗 Crawled Links</h3>
${data.links.map(l=>`<div class="issue">${l}</div>`).join("")}
</div>

<div class="section">
<h3>⚠️ Issues</h3>
${issues.map(i=>`
<div class="issue">
<b>${i.title}</b><br>
<span class="tip">👉 Improve this</span>
</div>
`).join("")}
</div>

`;

}catch(e){
console.error(e);
document.getElementById("results").innerHTML="Error loading data";
}

}

</script>

</body>
</html>
