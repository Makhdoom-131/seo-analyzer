<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background:#0f1117;
  color:#e8eaf0;
  margin:0;
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px 20px;
}

.hero h1 {
  font-size:32px;
}

/* INPUT */
.input-box {
  max-width:800px;
  margin:20px auto;
  background:#181c27;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid #2a2f42;
  background:#1e2333;
  color:#fff;
}

button {
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

/* RESULTS */
#results {
  max-width:900px;
  margin:20px auto;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.card {
  background:#181c27;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.score {
  font-size:22px;
  font-weight:600;
}

/* SECTIONS */
.section {
  background:#181c27;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}

.tip {
  color:#f7c948;
}

/* FOOTER */
.footer {
  text-align:center;
  margin:40px 0;
  color:#fff;
}

.footer a {
  color:#4f8ef7;
}

/* EMAIL */
.email-box {
  text-align:center;
  margin:30px;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:#181c27;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div style="text-align:center;">
  <button onclick="downloadPDF()">📄 Download Report</button>
</div>

<div class="email-box">
  <input id="email" placeholder="Enter your email">
  <button onclick="captureEmail()">Submit</button>
</div>

<div id="popup">
  <p>Need SEO help?</p>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">
    <button>Hire Me</button>
  </a>
</div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Hire Me</a>
</div>
<script>

const API_KEY = "AIzaSyBVPmzFj041q-Kh3nbyJIVAKAoCMMvsT0k";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;

if(!url) return alert("Enter URL");

if(!url.startsWith("http")) url = "https://" + url;

document.getElementById("results").innerHTML = "<div class='section'>Analyzing...</div>";

try{

const apiUrl = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&strategy=mobile&key=${API_KEY}`;

const res = await fetch(apiUrl);
const data = await res.json();

// 🛑 SAFE ACCESS (IMPORTANT)
const categories = data?.lighthouseResult?.categories;

if(!categories){
  console.log(data); // debug
  throw new Error("Invalid API response");
}

// Scores (SAFE)
const perf = Math.round((categories.performance?.score || 0) * 100);
const seoScore = Math.round((categories.seo?.score || 0) * 100);
const bp = Math.round((categories['best-practices']?.score || 0) * 100);
const access = Math.round((categories.accessibility?.score || 0) * 100);

// Core Web Vitals (SAFE)
const audits = data?.lighthouseResult?.audits || {};

const lcp = audits['largest-contentful-paint']?.displayValue || "N/A";
const cls = audits['cumulative-layout-shift']?.displayValue || "N/A";
const tbt = audits['total-blocking-time']?.displayValue || "N/A";

// ❌ REMOVE BACKEND FOR NOW (it’s causing 404)
// We will re-add later safely

// Dummy SEO data for now
let title = "Live fetch disabled (backend issue)";
let desc = "Meta data requires backend (will fix next)";
let h1 = "-";
let missingAlt = "-";
let keywords = ["seo","performance","audit"];

// UI
document.getElementById("results").innerHTML = `
<div class="grid">
<div class="card"><div class="score">${perf}</div><div>Performance</div></div>
<div class="card"><div class="score">${seoScore}</div><div>SEO</div></div>
<div class="card"><div class="score">${bp}</div><div>Best Practices</div></div>
<div class="card"><div class="score">${access}</div><div>Accessibility</div></div>
</div>

<div class="section">
<h3>⚡ Core Web Vitals</h3>
<p>LCP: ${lcp}</p>
<p>CLS: ${cls}</p>
<p>TBT: ${tbt}</p>
</div>

<div class="section">
<h3>📊 SEO Overview</h3>
<p>${title}</p>
<p>${desc}</p>
</div>

<div class="section">
<h3>🔑 Keywords</h3>
${keywords.join(", ")}
</div>
`;

setTimeout(()=>{
const popup = document.getElementById("popup");
if(popup) popup.style.display = "block";
},2000);

}catch(e){
console.error(e);
document.getElementById("results").innerHTML = `
<div class="section">
❌ API Error — check console (F12)
</div>`;
}

}

// PDF
function downloadPDF(){
html2pdf().from(document.getElementById("results")).save("seo-report.pdf");
}

// Email
function captureEmail(){
const email = document.getElementById("email").value;
if(!email) return alert("Enter email");
alert("Thanks! We'll contact you.");
}

</script>
</body>
</html>
