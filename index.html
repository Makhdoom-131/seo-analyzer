<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background:#0f1117;
  color:#e8eaf0;
  margin:0;
}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  font-size:36px;
  margin-bottom:10px;
}

.hero p {
  color:#7a7f96;
}

/* INPUT */
.input-box {
  max-width:800px;
  margin:20px auto;
  background:#181c27;
  padding:15px;
  border-radius:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid #2a2f42;
  background:#1e2333;
  color:#fff;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f8ef7,#7c5af7);
  color:#fff;
  cursor:pointer;
}

/* GRID */
.grid {
  max-width:900px;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:#181c27;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.score {
  font-size:28px;
  font-weight:600;
}

/* SECTIONS */
.section {
  max-width:900px;
  margin:20px auto;
  background:#181c27;
  padding:20px;
  border-radius:12px;
}

.tip {
  color:#f7c948;
  margin-top:5px;
}

/* LOADER */
.loader {
  text-align:center;
  margin-top:30px;
  color:#7a7f96;
}

/* FOOTER */
.footer {
  text-align:center;
  margin:40px 0;
  font-size:14px;
  color:#ffffff;
}

.footer a {
  color:#4f8ef7;
  text-decoration:none;
  font-weight:500;
}

.footer a:hover {
  text-decoration:underline;
}
 
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO & Performance Analyzer</h1>
  <p>Analyze any website with real data from Google</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter your website URL">
  <input id="compareInput" placeholder="Competitor (optional)">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div id="results"></div>

<div class="footer">
  Built by <strong>Makhdoom Abdul Aleem</strong> • 
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Hire on Upwork</a>
</div>

<script>

const API_KEY = "AIzaSyBVPmzFj041q-Kh3nbyJIVAKAoCMMvsT0k";
const PAGESPEED = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?key=${API_KEY}`;
const BACKEND_URL = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";

async function runAnalysis(){

let url = document.getElementById("urlInput").value;
let compare = document.getElementById("compareInput").value;

if(!url) return alert("Enter URL");

if(!url.startsWith("http")) url = "https://" + url;
if(compare && !compare.startsWith("http")) compare = "https://" + compare;

document.getElementById("results").innerHTML = `<div class="loader">Analyzing website...</div>`;

try{

const res = await fetch(`${PAGESPEED}&url=${url}&strategy=mobile`);
const data = await res.json();

const score = Math.round(data.lighthouseResult.categories.performance.score * 100);

// Fetch HTML
const htmlRes = await fetch(`${BACKEND_URL}${encodeURIComponent(url)}`);
const html = await htmlRes.text();

const doc = new DOMParser().parseFromString(html, "text/html");

const title = doc.querySelector("title")?.innerText || "Not found";
const desc = doc.querySelector('meta[name="description"]')?.content || "Not found";
const h1 = doc.querySelectorAll("h1").length;

// Suggestions
let tips = [];
if(title.length < 50) tips.push("Improve title length (50–60 chars)");
if(desc.length < 150) tips.push("Improve meta description (150–160 chars)");
if(h1 !== 1) tips.push("Use exactly one H1");

// UI
let output = `

<div class="grid">
  <div class="card">
    <div class="score">${score}</div>
    <div>Performance</div>
  </div>
</div>

<div class="section">
<h3>🏷 SEO Overview</h3>
<p><b>Title:</b> ${title}</p>
<p><b>Description:</b> ${desc}</p>
<p><b>H1 Count:</b> ${h1}</p>
</div>

<div class="section">
<h3>💡 Recommendations</h3>
${tips.length ? tips.map(t=>`<div class="tip">• ${t}</div>`).join("") : "All good 🎉"}
</div>
`;

// Competitor
if(compare){
  const compRes = await fetch(`${PAGESPEED}&url=${compare}&strategy=mobile`);
  const compData = await compRes.json();
  const compScore = Math.round(compData.lighthouseResult.categories.performance.score * 100);

  output += `
  <div class="section">
    <h3>⚔️ Competitor Comparison</h3>
    <p>${compare}</p>
    <div class="score">${compScore}/100</div>
  </div>
  `;
}

document.getElementById("results").innerHTML = output;

}catch(e){
  document.getElementById("results").innerHTML = "Error loading data";
}

}

</script>

</body>
</html>
