<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: #0f1117; color: #fff; margin: 0; line-height: 1.6; padding-bottom: 100px; }
.hero { text-align:center; padding:60px 20px 20px; }
.hero h1 { margin: 0; font-size: 2.5em; }
.hero p { color: #888; margin-top: 10px; }
.input-box { max-width:900px; margin:20px auto 10px; display:flex; gap:10px; padding:0 20px; }
input { flex:1; padding:14px 16px; border-radius:8px; border:1px solid #2a2f3e; background:#1a1f2e; color:#fff; font-size:16px; }
input:focus { outline:none; border-color:#6c5ce7; }
button { padding:14px 24px; background:#6c5ce7; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:16px; transition: background 0.3s; }
button:hover { background: #5a4bd1; }

/* History Dropdown */
.history-box { max-width: 900px; margin: 0 auto 20px; padding: 0 20px; text-align: right; }
.history-drop { background: #1a1f2e; color: #fff; border: 1px solid #2a2f3e; padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: pointer; }

/* Action Buttons */
.actions-box { max-width: 1000px; margin: 0 auto 10px; padding: 0 20px; display: flex; gap: 10px; justify-content: flex-end; display: none; }
.action-btn { background: transparent; border: 1px solid #444; color: #aaa; padding: 8px 16px; font-size: 13px; border-radius: 6px; }
.action-btn:hover { border-color: #fff; color: #fff; background: transparent; }

#results { max-width:1000px; margin:0 auto 40px; padding:0 20px; }
.section { background:#1a1f2e; padding:24px; margin-top:20px; border-radius:12px; border:1px solid #2a2f3e; }
.section h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; }

/* NoIndex Critical Alert */
.critical-alert { background: rgba(255, 23, 68, 0.1); border: 2px solid #ff1744; color: #ff1744; font-weight: bold; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 18px; text-align: center;}

/* Scores Grid */
.scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.score-card { background:#111; padding:20px; border-radius:10px; text-align:center; }
.score-label { display:block; font-size:14px; color:#888; margin-bottom:8px; }
.score-value { font-size:3em; font-weight:700; }

/* CWV Grid */
.cwv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px;}
.cwv-card { background: #111; padding: 15px; border-radius: 8px; text-align: center; border-left: 4px solid #555;}
.cwv-title { font-size: 12px; color: #888; text-transform: uppercase;}
.cwv-val { font-size: 24px; font-weight: 700; margin: 5px 0;}
.cwv-status { font-size: 12px; font-weight: 600;}

/* Headings Tree */
.tree { font-family: monospace; font-size: 14px; background: #111; padding: 15px; border-radius: 8px; line-height: 1.8; }
.tree .h1 { color: #ff6b6b; font-weight: bold; }
.tree .h2 { color: #f7c948; margin-left: 20px; }
.tree .h3 { color: #74b9ff; margin-left: 40px; }
.tree-err { color: #ff6b6b; margin-top: 10px; font-family: sans-serif; font-size: 14px;}

.og-card { border:1px solid #333; border-radius:12px; overflow:hidden; max-width:500px; background:#111; font-family: sans-serif; }
.og-card img { width:100%; height:200px; object-fit:cover; background:#222; }
.og-text { padding:15px; }
.og-text span { color:#666; font-size:12px; }
.og-text h4 { margin:5px 0; color:#fff; font-size:16px;}
.og-text p { margin:0; color:#aaa; font-size:14px; }

.issue { background:#111; padding:12px 16px; margin:8px 0; border-radius:8px; border-left: 3px solid #ff6b6b; display:flex; align-items:center; gap:12px; }
.issue img { border-radius:6px; object-fit:cover; }
.tip { color:#f7c948; font-size:14px; }

/* CTA Bar */
#sticky-cta { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 17, 23, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #2a2f3e; padding: 15px 20px; z-index: 1000; justify-content: center; align-items: center; gap: 20px; animation: slideUp 0.5s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.cta-text { font-weight: 600; color: #fff; }
.cta-text span { color: #888; font-weight: 400; font-size: 14px; margin-left: 8px; }
.hire-btn { background: #14a800; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; transition: background 0.3s; }
.hire-btn:hover { background: #118c00; }
.contact-links a { color: #aaa; text-decoration: none; margin-left: 15px; font-size: 14px; transition: color 0.2s; }
.contact-links a:hover { color: #fff; }

footer { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; border-top: 1px solid #1a1f2e; margin-top: 60px; }
footer a { color: #6c5ce7; text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* PDF Export Styles */
@media print {
  body { background: #fff !important; color: #000 !important; padding-bottom: 0 !important; }
  .hero, .input-box, .history-box, .actions-box, #sticky-cta, footer { display: none !important; }
  .section { background: #fff !important; border: 1px solid #ccc !important; break-inside: avoid; }
  .score-card, .cwv-card, .og-card, .issue, .tree { background: #f9f9f9 !important; color: #000 !important; }
  .og-card img { box-shadow: none; }
}

@media (max-width: 768px) {
  .input-box, .actions-box { flex-direction: column; }
  .scores-grid { grid-template-columns: 1fr; }
  .cwv-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 1.8em; }
  #sticky-cta { flex-direction: column; text-align: center; gap: 10px; }
  .contact-links a { margin: 0 8px; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>🚀 SEO Analyzer</h1>
  <p>Full SEO, Open Graph & Performance Audit</p>
</div>

<div class="input-box">
  <input id="urlInput" placeholder="Enter website URL (e.g., example.com)">
  <button onclick="runAnalysis()">Analyze</button>
</div>

<div class="history-box">
  <select id="historyDrop" class="history-drop" onchange="loadHistory(this.value)">
    <option value="">⏳ Recent Scans</option>
  </select>
</div>

<div class="actions-box" id="actionBtns">
  <button class="action-btn" onclick="copyAsIssue()">📋 Copy as GitHub Issue</button>
  <button class="action-btn" onclick="window.print()">📄 Export PDF</button>
</div>

<div id="results"></div>

<footer>
  <p>Built with ❤️ by <strong>Makhdoom Abdul Aleem</strong></p>
  <p style="margin-top: 8px;">
    <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank">Upwork Profile</a> &nbsp;|&nbsp; 
    makhdoomabdulaleem@gmail.com &nbsp;|&nbsp; +92 347 360 6783
  </p>
</footer>

<div id="sticky-cta">
  <div class="cta-text">Impressed by the tool? Hire me to build one for you.<span>(Frontend, Backend & Cloudflare Workers)</span></div>
  <a href="https://www.upwork.com/freelancers/~015e6c72507369c4a1" target="_blank" class="hire-btn">Hire Me on Upwork</a>
  <div class="contact-links">
    <a href="mailto:makhdoomabdulaleem@gmail.com">📧 Email</a>
    <a href="tel:+923473606783">📞 Call</a>
  </div>
</div>

<script>
const API = "https://super-disk-7ef9.makhdoomabdulaleem.workers.dev/?url=";
let currentAuditData = null; // Store for copy function

function getScoreColor(score) { return score >= 90 ? "#00c853" : score >= 50 ? "#ffab00" : "#ff1744"; }
function getCwvColor(type, val) {
  if(type === 'lcp') return val <= 2.5 ? "#00c853" : val <= 4 ? "#ffab00" : "#ff1744";
  if(type === 'cls') return val <= 0.1 ? "#00c853" : val <= 0.25 ? "#ffab00" : "#ff1744";
  if(type === 'tbt') return val <= 200 ? "#00c853" : val <= 600 ? "#ffab00" : "#ff1744";
}

async function runAnalysis() {
  let url = document.getElementById("urlInput").value.trim();
  if (!url) return alert("Please enter a URL");
  if (!url.startsWith("http")) url = "https://" + url;

  const resultsDiv = document.getElementById("results");
  document.getElementById("sticky-cta").style.display = "none";
  document.getElementById("actionBtns").style.display = "none";
  resultsDiv.innerHTML = `<div class="section" style="text-align:center;">⏳ Fetching data... (10-15 seconds)</div>`;

  try {
    const res = await fetch(API + encodeURIComponent(url));
    if (!res.ok) throw new Error("Worker fetch failed");
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!data.mobile?.lighthouseResult) throw new Error("Invalid API response");

    currentAuditData = data; // Save for copy function
    saveToHistory(url);

    const m = data.mobile.lighthouseResult;
    const d = data.desktop.lighthouseResult;
    const mScore = Math.round(m.categories.performance.score * 100);
    const dScore = Math.round(d.categories.performance.score * 100);
    
    const images = data.images || [];
    const missingAlt = images.filter(i => !i.alt);
    const links = data.links || [];
    const issues = Object.values(m.audits).filter(a => a.score !== null && a.score < 0.9).slice(0, 5);
    const seo = data.seo || {};
    const displayUrl = new URL(url);

    // ✅ Extract Core Web Vitals
    const audits = m.audits;
    const lcp = audits["largest-contentful-paint"];
    const cls = audits["cumulative-layout-shift"];
    const tbt = audits["total-blocking-time"];

    // ✅ Build Heading Tree HTML
    let treeHtml = "";
    if (seo.headings) {
      if(seo.headings.h1.length === 0) treeHtml += `<div class="tree-err">❌ Missing H1 Tag</div>`;
      if(seo.headings.h1.length > 1) treeHtml += `<div class="tree-err">❌ Error: Found ${seo.headings.h1.length} H1 tags (Should only be 1)</div>`;
      
      seo.headings.h1.forEach(t => treeHtml += `<div class="h1">H1: ${t}</div>`);
      seo.headings.h2.forEach(t => treeHtml += `<div class="h2">└── H2: ${t}</div>`);
      seo.headings.h3.forEach(t => treeHtml += `<div class="h3">└── H3: ${t}</div>`);
      if(!treeHtml) treeHtml = "No H1, H2, or H3 tags found.";
    } else treeHtml = "Could not parse headings.";

    resultsDiv.innerHTML = `
      ${seo.isNoIndex ? `<div class="critical-alert">🚨 CRITICAL ERROR: This page has a NOINDEX tag. Google will completely ignore it!</div>` : ""}

      <div class="section">
        <h3>📊 Performance Scores</h3>
        <div class="scores-grid">
          <div class="score-card"><span class="score-label">📱 Mobile</span><span class="score-value" style="color:${getScoreColor(mScore)}">${mScore}</span></div>
          <div class="score-card"><span class="score-label">🖥️ Desktop</span><span class="score-value" style="color:${getScoreColor(dScore)}">${dScore}</span></div>
        </div>
        
        <h3 style="margin-top: 25px;">⚡ Core Web Vitals (Mobile)</h3>
        <div class="cwv-grid">
          <div class="cwv-card" style="border-left-color: ${getCwvColor('lcp', parseFloat(lcp?.numericValue))}">
            <div class="cwv-title">Largest Contentful Paint</div>
            <div class="cwv-val" style="color: ${getCwvColor('lcp', parseFloat(lcp?.numericValue))}">${lcp?.displayValue || 'N/A'}</div>
            <div class="cwv-status">${parseFloat(lcp?.numericValue) <= 2.5 ? '✅ Good' : '⚠️ Poor'}</div>
          </div>
          <div class="cwv-card" style="border-left-color: ${getCwvColor('cls', parseFloat(cls?.numericValue))}">
            <div class="cwv-title">Cumulative Layout Shift</div>
            <div class="cwv-val" style="color: ${getCwvColor('cls', parseFloat(cls?.numericValue))}">${cls?.displayValue || 'N/A'}</div>
            <div class="cwv-status">${parseFloat(cls?.numericValue) <= 0.1 ? '✅ Good' : '⚠️ Poor'}</div>
          </div>
          <div class="cwv-card" style="border-left-color: ${getCwvColor('tbt', parseFloat(tbt?.numericValue))}">
            <div class="cwv-title">Total Blocking Time</div>
            <div class="cwv-val" style="color: ${getCwvColor('tbt', parseFloat(tbt?.numericValue))}">${tbt?.displayValue || 'N/A'}</div>
            <div class="cwv-status">${parseFloat(tbt?.numericValue) <= 200 ? '✅ Good' : '⚠️ Poor'}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>🐦 Social Share Preview</h3>
        <div class="og-card">
          <img src="${seo.ogImage || 'https://placehold.co/500x200/1a1f2e/666?text=No+OG+Image+Set'}" alt="Preview">
          <div class="og-text">
            <span>${displayUrl.hostname}</span>
            <h4>${seo.ogTitle || seo.title || '❌ Missing Title'}</h4>
            <p>${seo.ogDescription || seo.metaDescription || '❌ Missing Description'}</p>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>🏗️ Content Structure (Headings)</h3>
        <div class="tree">${treeHtml}</div>
      </div>

      <div class="section">
        <h3>🖼️ Image Audit (${images.length} found, ${missingAlt.length} missing ALT)</h3>
        ${images.length ? images.map(img => `<div class="issue"><div style="flex:1;"><div style="font-size:12px; color:#aaa; word-break:break-all;">${img.src.substring(0, 60)}...</div><div style="color: ${img.alt ? '#00c853' : '#ff6b6b'}">ALT: ${img.alt || "❌ Missing"}</div></div></div>`).join("") : "<p>Could not extract images.</p>"}
      </div>

      <div class="section">
        <h3>⚠️ Top Performance Issues</h3>
        ${issues.length ? issues.map(i => `<div class="issue"><div style="flex:1;"><b>${i.title}</b><div class="tip">👉 ${i.displayValue || 'Needs improvement'}</div></div></div>`).join("") : "<p>✅ No major performance issues found!</p>"}
      </div>
    `;

    document.getElementById("sticky-cta").style.display = "flex";
    document.getElementById("actionBtns").style.display = "flex";

  } catch (e) {
    console.error(e);
    let msg = "An unknown error occurred.";
    const err = e.message.toLowerCase();
    if (err.includes("google api error") || err.includes("403")) msg = "🚫 Google API key issue or quota exceeded.";
    else if (err.includes("failed to fetch") || err.includes("quic")) msg = "🛡️ This website blocked the scan. Try a different site.";
    
    resultsDiv.innerHTML = `<div class="section" style="border:1px solid #ff6b6b;"><h3>❌ Analysis Failed</h3><p>${msg}</p></div>`;
  }
}

// ✅ History Management (Local Storage)
function saveToHistory(url) {
  let history = JSON.parse(localStorage.getItem('seo_history') || '[]');
  history = history.filter(h => h !== url);
  history.unshift(url);
  if(history.length > 5) history.pop();
  localStorage.setItem('seo_history', JSON.stringify(history));
  updateHistoryDropdown();
}

function loadHistory(url) {
  if(!url) return;
  document.getElementById("urlInput").value = url;
  document.getElementById("historyDrop").value = "";
  runAnalysis();
}

function updateHistoryDropdown() {
  const drop = document.getElementById("historyDrop");
  const history = JSON.parse(localStorage.getItem('seo_history') || '[]');
  drop.innerHTML = '<option value="">⏳ Recent Scans</option>' + history.map(h => `<option value="${h}">${h}</option>`).join('');
}

// ✅ Copy as GitHub Issue
function copyAsIssue() {
  if(!currentAuditData) return;
  const seo = currentAuditData.seo || {};
  const images = currentAuditData.images || [];
  const issues = Object.values(currentAuditData.mobile.lighthouseResult.audits).filter(a => a.score !== null && a.score < 0.9).slice(0, 5);

  let md = `## SEO Audit Report\n`;
  md += `- **Missing ALT Tags:** ${images.filter(i => !i.alt).length}\n`;
  md += `- **NoIndex Tag:** ${seo.isNoIndex ? '❌ YES (CRITICAL)' : '✅ No'}\n`;
  md += `- **H1 Tags:** ${seo.headings?.h1?.length || 0} (Should be 1)\n\n`;
  md += `### Performance Issues\n`;
  issues.forEach(i => md += `- [ ] ${i.title} (${i.displayValue})\n`);

  navigator.clipboard.writeText(md).then(() => alert('✅ Copied to clipboard! Paste it into GitHub.'));
}

// Init
updateHistoryDropdown();
document.getElementById("urlInput").addEventListener("keypress", e => { if (e.key === "Enter") runAnalysis(); });
</script>
</body>
</html>
